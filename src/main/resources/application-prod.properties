# ==========================================
# PRODUCTION ENVIRONMENT PROFILE (prod)
# ==========================================

# Database config reading from Environment Variables (Security Best Practice)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://production-db-host:5432/bookstore}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:prodpassword}

# Hibernate / JPA (Do NOT auto-update schema in production to avoid data loss)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=false

# Redis config reading from Environment Variables
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging Level (Only show INFO and above to save server disk space)
logging.level.com.example.bookstore=INFO

# Session Cookie Security Configuration (Production must force HTTPS)
server.servlet.session.cookie.secure=true

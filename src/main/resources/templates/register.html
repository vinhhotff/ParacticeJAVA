<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - BookFlow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', // Indigo-600
                        primaryHover: '#4338CA', // Indigo-700
                        bgSlate: '#F8FAFC',
                        cardBg: '#FFFFFF',
                        borderSlate: '#E2E8F0',
                        emeraldAccent: '#10B981',
                        amberAccent: '#F59E0B',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;850&amp;display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
            color: #0F172A;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-[#F8FAFC] bg-[radial-gradient(at_0%_0%,rgba(99,102,241,0.08)_0px,transparent_50%),radial-gradient(at_100%_100%,rgba(129,140,248,0.06)_0px,transparent_50%)]">

    <!-- Card Container -->
    <div class="bg-white border border-slate-200 rounded-3xl p-6 sm:p-10 shadow-xl max-w-lg w-full relative z-10 transition-all duration-300">
        
        <!-- Logo & Header -->
        <div class="text-center space-y-4 mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-primary rounded-2xl text-white shadow-md shadow-primary/20">
                <i data-lucide="user-plus" class="w-6 h-6"></i>
            </div>
            <div class="space-y-1.5">
                <h3 class="text-2xl font-black tracking-tight text-slate-900">Tạo tài khoản mới</h3>
                <p class="text-xs text-slate-500 leading-normal">Tham gia BookFlow để thuê và trải nghiệm hàng ngàn tác phẩm</p>
            </div>
        </div>

        <!-- Alerts Section -->
        <div class="space-y-3 mb-6" th:if="${errorMessage}">
            <!-- Alert Lỗi Đăng Ký -->
            <div class="bg-red-50 border border-red-100 rounded-2xl p-4 flex items-start space-x-3 text-red-700">
                <i data-lucide="alert-triangle" class="w-5 h-5 shrink-0 text-red-500 mt-0.5"></i>
                <div class="text-xs font-semibold leading-normal" th:text="${errorMessage}">Đăng ký thất bại!</div>
            </div>
        </div>

        <!-- Form -->
        <form th:action="@{/register}" method="POST" class="space-y-4">
            
            <!-- Họ và Tên Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label for="firstName" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Họ</label>
                    <input type="text" id="firstName" name="firstName" th:value="${firstName}" required placeholder="Nguyễn" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
                <div class="space-y-1.5">
                    <label for="lastName" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Tên</label>
                    <input type="text" id="lastName" name="lastName" th:value="${lastName}" required placeholder="Văn A" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <!-- Username Input -->
            <div class="space-y-1.5">
                <label for="username" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Tên Đăng Nhập</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </span>
                    <input type="text" id="username" name="username" th:value="${username}" required placeholder="Tối thiểu 3 ký tự..." 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <!-- Email Input -->
            <div class="space-y-1.5">
                <label for="email" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Email</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </span>
                    <input type="email" id="email" name="email" th:value="${email}" required placeholder="Viết địa chỉ email của bạn..." 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <!-- Password Input -->
            <div class="space-y-1.5">
                <label for="password" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Mật Khẩu</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password" name="password" required placeholder="Tối thiểu 8 ký tự..." 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-primary hover:bg-primaryHover text-white font-bold p-3.5 rounded-xl text-sm transition-all duration-200 shadow-md shadow-primary/10 flex items-center justify-center space-x-2 cursor-pointer pt-3">
                <span>Đăng Ký Tài Khoản</span>
                <i data-lucide="user-plus" class="w-4 h-4"></i>
            </button>
        </form>

        <!-- Footer links -->
        <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center space-y-3">
            <a href="/login" class="text-xs text-slate-500 hover:text-primary transition-colors font-semibold flex items-center space-x-1.5">
                <i data-lucide="log-in" class="w-3.5 h-3.5"></i>
                <span>Đã có tài khoản? Đăng nhập ngay</span>
            </a>
            <a href="/books" class="text-xs text-slate-400 hover:text-slate-600 transition-colors font-semibold flex items-center space-x-1.5">
                <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
                <span>Quay lại trang chủ</span>
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - BookFlow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', // Indigo-600
                        primaryHover: '#4338CA', // Indigo-700
                        bgSlate: '#F8FAFC',
                        cardBg: '#FFFFFF',
                        borderSlate: '#E2E8F0',
                        emeraldAccent: '#10B981',
                        amberAccent: '#F59E0B',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;850&amp;display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
            color: #0F172A;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-[#F8FAFC] bg-[radial-gradient(at_0%_0%,rgba(99,102,241,0.08)_0px,transparent_50%),radial-gradient(at_100%_100%,rgba(129,140,248,0.06)_0px,transparent_50%)]">

    <!-- Card Container -->
    <div class="bg-white border border-slate-200 rounded-3xl p-6 sm:p-10 shadow-xl max-w-md w-full relative z-10 transition-all duration-300">
        
        <!-- Logo & Header -->
        <div class="text-center space-y-4 mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-primary rounded-2xl text-white shadow-md shadow-primary/20">
                <i data-lucide="book-open" class="w-6 h-6"></i>
            </div>
            <div class="space-y-1.5">
                <h3 class="text-2xl font-black tracking-tight text-slate-900">Chào mừng quay lại</h3>
                <p class="text-xs text-slate-500 leading-normal">Đăng nhập để tiếp tục quản lý &amp; mượn sách trên BookFlow</p>
            </div>
        </div>

        <!-- Alerts Section -->
        <div class="space-y-3 mb-6">
            <!-- Alert Lỗi Đăng Nhập -->
            <div class="bg-red-50 border border-red-100 rounded-2xl p-4 flex items-start space-x-3 text-red-700" th:if="${param.error}">
                <i data-lucide="alert-triangle" class="w-5 h-5 shrink-0 text-red-500 mt-0.5"></i>
                <div class="text-xs font-semibold leading-normal">Tài khoản hoặc mật khẩu không chính xác!</div>
            </div>

            <!-- Alert Đăng Xuất Thành Công -->
            <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 flex items-start space-x-3 text-emerald-700" th:if="${param.logout}">
                <i data-lucide="check-circle" class="w-5 h-5 shrink-0 text-emerald-500 mt-0.5"></i>
                <div class="text-xs font-semibold leading-normal">Bạn đã đăng xuất thành công!</div>
            </div>

            <!-- Alert Đăng Ký Thành Công -->
            <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 flex items-start space-x-3 text-emerald-700" th:if="${param.registerSuccess}">
                <i data-lucide="check-circle" class="w-5 h-5 shrink-0 text-emerald-500 mt-0.5"></i>
                <div class="text-xs font-semibold leading-normal">Đăng ký tài khoản thành công! Vui lòng đăng nhập.</div>
            </div>
        </div>

        <!-- Form -->
        <form th:action="@{/login}" method="POST" class="space-y-5">
            <!-- Email Input -->
            <div class="space-y-1.5">
                <label for="username" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Email Đăng Nhập</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </span>
                    <input type="email" id="username" name="username" required autofocus placeholder="Nhập email của bạn..." 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <!-- Password Input -->
            <div class="space-y-1.5">
                <label for="password" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Mật Khẩu</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu..." 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-primary hover:bg-primaryHover text-white font-bold p-3.5 rounded-xl text-sm transition-all duration-200 shadow-md shadow-primary/10 flex items-center justify-center space-x-2 cursor-pointer">
                <span>Đăng Nhập</span>
                <i data-lucide="log-in" class="w-4 h-4"></i>
            </button>
        </form>

        <!-- Footer links -->
        <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center space-y-3">
            <a href="/register" class="text-xs text-slate-500 hover:text-primary transition-colors font-semibold flex items-center space-x-1.5">
                <i data-lucide="user-plus" class="w-3.5 h-3.5"></i>
                <span>Chưa có tài khoản? Đăng ký ngay</span>
            </a>
            <a href="/books" class="text-xs text-slate-400 hover:text-slate-600 transition-colors font-semibold flex items-center space-x-1.5">
                <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
                <span>Quay lại trang chủ</span>
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>

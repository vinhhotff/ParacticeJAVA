server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/resource_allocation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Embedding service configuration
embedding:
  service:
    url: ${EMBEDDING_SERVICE_URL:http://localhost:5000}

gemini:
  api:
    key: ${GEMINI_API_KEY:}

app:
  allocation:
    max-percent: 100